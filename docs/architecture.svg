<svg viewBox="0 0 1240 1015" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg{fill:#FBF9F4}
    .blue{fill:#E6F1FB;stroke:#378ADD;stroke-width:1.4}
    .purple{fill:#EEEDFE;stroke:#7F77DD;stroke-width:1.4}
    .amber{fill:#FAEEDA;stroke:#BA7517;stroke-width:1.6}
    .teal{fill:#E1F5EE;stroke:#1D9E75;stroke-width:1.4}
    .gray{fill:#F1EFE8;stroke:#888780;stroke-width:1.4}
    .chip{fill:#FFFFFF;stroke:#BA7517;stroke-width:1}
    .chipp{fill:#FFFFFF;stroke:#7F77DD;stroke-width:1}
    .chipg{fill:#FFFFFF;stroke:#888780;stroke-width:1}
    .tb{fill:#0C447C} .tp{fill:#3C3489} .ta{fill:#633806} .tt{fill:#085041} .tg{fill:#2C2C2A}
    .muted{fill:#6B675E} .hd{fill:#3A3A37;font-weight:600}
    text{font-size:12px}
    .flow{stroke:#9b958a;stroke-width:1.4;fill:none}
  </style>
  <rect class="bg" x="0" y="0" width="1240" height="1015"/>

  <text class="hd" x="40" y="20" font-size="13">Frontend · Vercel</text>
  <rect class="blue" x="40" y="28" width="210" height="52" rx="8"/>
  <text class="tb" x="145" y="50" text-anchor="middle" font-size="13" font-weight="600">Browser</text>
  <text class="muted" x="145" y="68" text-anchor="middle" font-size="11">Notes · Organize · Graph</text>
  <line class="flow" x1="250" y1="54" x2="288" y2="54" marker-end="url(#a)"/>
  <rect class="blue" x="292" y="28" width="300" height="52" rx="8"/>
  <text class="tb" x="442" y="50" text-anchor="middle" font-size="13" font-weight="600">Next.js app + store.ts</text>
  <text class="muted" x="442" y="68" text-anchor="middle" font-size="11">BFF route handlers · /api/* · SSE</text>

  <line x1="40" y1="100" x2="1210" y2="100" stroke="#C9B79A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text class="muted" x="44" y="95" font-size="11">HTTP boundary — no LLM / embedding call above this line</text>

  <line class="flow" x1="442" y1="80" x2="442" y2="115" marker-end="url(#a)"/>
  <rect class="blue" x="40" y="118" width="724" height="58" rx="8"/>
  <text class="tb" x="58" y="142" font-size="15" font-weight="600">kg_api · FastAPI edge</text>
  <text class="muted" x="58" y="163" font-size="11.5">auth chokepoint (get_current_user · KG_AUTH) · validate · enqueue · SSE /jobs/:id/stream · reads — NO LLM</text>

  <line class="flow" x1="402" y1="176" x2="402" y2="200" marker-end="url(#a)"/>
  <rect class="purple" x="40" y="202" width="724" height="64" rx="8"/>
  <text class="tp" x="58" y="226" font-size="14" font-weight="600">KG_QUEUE · async substrate</text>
  <text class="muted" x="58" y="244" font-size="11">durable outbox = jobs table · data-layer idempotency · at-least-once</text>
  <rect class="chipp" x="486" y="210" width="86" height="46" rx="6"/><text class="tp" x="529" y="230" text-anchor="middle" font-size="11">memory</text><text class="muted" x="529" y="246" text-anchor="middle" font-size="10.5">dev</text>
  <rect class="chipp" x="578" y="210" width="92" height="46" rx="6"/><text class="tp" x="624" y="230" text-anchor="middle" font-size="11">pg SKIP</text><text class="muted" x="624" y="246" text-anchor="middle" font-size="10.5">LOCKED</text>
  <rect class="chipp" x="676" y="210" width="80" height="46" rx="6"/><text class="tp" x="716" y="230" text-anchor="middle" font-size="11">redis</text><text class="muted" x="716" y="246" text-anchor="middle" font-size="10.5">Dramatiq</text>

  <line class="flow" x1="402" y1="266" x2="402" y2="290" marker-end="url(#a)"/>
  <rect class="amber" x="40" y="292" width="724" height="170" rx="8"/>
  <text class="ta" x="58" y="316" font-size="15" font-weight="600">kg_workers → kg_engine pipeline — the moat</text>
  <text class="muted" x="58" y="335" font-size="11">drains queue off-path · per-user engine · cached by (content_hash, model_version) · q = min(validity, nonobv) ≥ 3</text>
  <rect class="chip" x="56" y="350" width="108" height="52" rx="6"/><text class="ta" x="110" y="372" text-anchor="middle">extract</text><text class="muted" x="110" y="389" text-anchor="middle" font-size="10.5">facets · Haiku</text>
  <rect class="chip" x="170" y="350" width="108" height="52" rx="6"/><text class="ta" x="224" y="372" text-anchor="middle">embed</text><text class="muted" x="224" y="389" text-anchor="middle" font-size="10.5">abs + topical</text>
  <rect class="chip" x="284" y="350" width="116" height="52" rx="6"/><text class="ta" x="342" y="372" text-anchor="middle">retrieve</text><text class="muted" x="342" y="389" text-anchor="middle" font-size="10.5">ANN · prune</text>
  <rect class="chip" x="406" y="350" width="104" height="52" rx="6"/><text class="ta" x="458" y="372" text-anchor="middle">reason</text><text class="muted" x="458" y="389" text-anchor="middle" font-size="10.5">Sonnet</text>
  <rect class="chip" x="516" y="350" width="116" height="52" rx="6"/><text class="ta" x="574" y="372" text-anchor="middle">verify</text><text class="muted" x="574" y="389" text-anchor="middle" font-size="10.5">decorrelated</text>
  <rect class="chip" x="638" y="350" width="110" height="52" rx="6"/><text class="ta" x="693" y="372" text-anchor="middle">q ≥ 3 gate</text><text class="muted" x="693" y="389" text-anchor="middle" font-size="10.5">surface</text>
  <text class="muted" x="58" y="430" font-size="11">topical vector used inversely: low sim → connection (graph) · high sim → cluster (Organize)</text>
  <text class="muted" x="58" y="449" font-size="11">+ stage_events telemetry per job</text>

  <line class="flow" x1="200" y1="462" x2="200" y2="486" marker-end="url(#a)"/>
  <rect class="gray" x="40" y="488" width="220" height="56" rx="8"/>
  <text class="tg" x="150" y="512" text-anchor="middle" font-size="13" font-weight="600">model_router</text>
  <text class="muted" x="150" y="529" text-anchor="middle" font-size="10.5">+ rate governor · KG_PROVIDER</text>
  <line class="flow" x1="260" y1="516" x2="300" y2="516" marker-end="url(#a)"/>
  <rect class="gray" x="302" y="488" width="462" height="56" rx="8"/>
  <text class="tg" x="396" y="512" text-anchor="middle">fake · Ollama</text><text class="muted" x="396" y="529" text-anchor="middle" font-size="10.5">Community / dev</text>
  <line x1="516" y1="496" x2="516" y2="536" stroke="#C9C5BC"/>
  <text class="tg" x="640" y="512" text-anchor="middle">Anthropic + Voyage</text><text class="muted" x="640" y="529" text-anchor="middle" font-size="10.5">Premium (managed)</text>

  <rect class="teal" x="800" y="118" width="410" height="344" rx="8"/>
  <text class="tt" x="818" y="142" font-size="15" font-weight="600">Postgres 16 + pgvector</text>
  <text class="muted" x="818" y="160" font-size="11">single system of record · RLS · per-request pool · HNSW</text>
  <text class="tt" x="818" y="190">api_notes · api_connections (ON CONFLICT)</text>
  <text class="tt" x="818" y="214">facet_cache · topical_cache  (content-keyed)</text>
  <text class="tt" x="818" y="238">note_facets / facet_index  (HNSW, by type)</text>
  <text class="tt" x="818" y="262">pair_dedup  (judge once, ever)</text>
  <text class="tt" x="818" y="286">feedback_events  (append-only · the moat)</text>
  <text class="tt" x="818" y="310">note_clusters  (multi-section)</text>
  <text class="tt" x="818" y="334">jobs  (outbox / SKIP LOCKED)</text>
  <text class="tt" x="818" y="358">pipeline_runs · stage_events</text>
  <text class="tt" x="818" y="382">prompt_versions · eval_runs</text>
  <text class="muted" x="818" y="410" font-size="11">user_id = leading scope on every row · fail-closed RLS</text>
  <text class="muted" x="818" y="430" font-size="11">embedding dim is an explicit schema dimension</text>
  <line class="flow" x1="764" y1="146" x2="798" y2="146" marker-end="url(#a)"/>
  <line class="flow" x1="764" y1="372" x2="798" y2="350" marker-end="url(#a)"/>
  <rect class="teal" x="800" y="488" width="410" height="56" rx="8"/>
  <text class="tt" x="1005" y="512" text-anchor="middle" font-size="13" font-weight="600">S3 / Cloudflare R2</text>
  <text class="muted" x="1005" y="529" text-anchor="middle" font-size="10.5">raw import blobs + audit trail</text>

  <text class="hd" x="40" y="588" font-size="13">Cross-cutting</text>
  <rect class="gray" x="40" y="598" width="280" height="64" rx="8"/><text class="tg" x="58" y="621" font-weight="600">Auth · KG_AUTH</text><text class="muted" x="58" y="640" font-size="11">none (loopback) · local · Clerk JWT</text>
  <rect class="gray" x="332" y="598" width="280" height="64" rx="8"/><text class="tg" x="350" y="621" font-weight="600">Observability</text><text class="muted" x="350" y="640" font-size="11">stage_events + Sentry · OTel deferred</text>
  <rect class="gray" x="624" y="598" width="280" height="64" rx="8"/><text class="tg" x="642" y="621" font-weight="600">Eval gate (deploy gate)</text><text class="muted" x="642" y="640" font-size="11">golden + floor · recall@20 · CI</text>
  <rect class="gray" x="916" y="598" width="294" height="64" rx="8"/><text class="tg" x="934" y="621" font-weight="600">Scheduler — Premium</text><text class="muted" x="934" y="640" font-size="11">cron → tick · scan + weekly digest</text>

  <rect class="amber" x="40" y="690" width="15" height="15" rx="3"/><text class="muted" x="63" y="702" font-size="11">amber = engine pipeline (the moat)</text>
  <text class="muted" x="63" y="721" font-size="11">dashed = HTTP boundary / edition seam</text>
  <text class="muted" x="360" y="702" font-size="11">Community: memory|pg queue · Ollama · no auth · local data</text>
  <text class="muted" x="360" y="721" font-size="11">Premium: Redis+Dramatiq · Clerk · managed Claude + Voyage · digest</text>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9b958a"/>
    </marker>
  </defs>
</svg>

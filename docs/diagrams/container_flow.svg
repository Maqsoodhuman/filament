<svg viewBox="0 0 1240 740" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg{fill:#FFFFFF}
    .cont{fill:#1F5FA5;stroke:#143F70;stroke-width:1.3}
    .eng{fill:#BA7517;stroke:#8a560f;stroke-width:1.4}
    .data{fill:#1D9E75;stroke:#0f6e56;stroke-width:1.3}
    .ext{fill:#7A7A75;stroke:#555550;stroke-width:1.2}
    .w{fill:#FFFFFF} .wm{fill:#E8EEF6} .em{fill:#f0eadf} .dm{fill:#e3f3ec} .xm{fill:#EDEDEA}
    .rel{stroke:#9aa0a8;stroke-width:1.4;fill:none}
    .rl{fill:#4b5058;font-size:10.5px}
    .step{fill:#1F5FA5;font-weight:700;font-size:11px}
    .ttl{fill:#1a1a18;font-weight:700}
  </style>
  <rect class="bg" x="0" y="0" width="1240" height="740"/>
  <text class="ttl" x="32" y="30" font-size="17">Container &amp; data flow — "Find connections" / "Scan"</text>
  <text x="32" y="50" font-size="12" fill="#6b675e">C4 Level 2 · containers on our stack (Vercel · Fly · Managed Postgres) · numbered = the on-demand trigger flow</text>

  <!-- sync plane label + boundary -->
  <text x="36" y="78" font-size="11" fill="#7e93b3" font-weight="600">SYNCHRONOUS · HTTP request path (no LLM / embedding)</text>
  <rect class="cont" x="40" y="86" width="250" height="74" rx="9"/>
  <text class="w" x="56" y="110" font-weight="600">Web app + BFF</text>
  <text class="wm" x="56" y="127" font-size="10.5">[Next.js · Vercel]</text>
  <text class="wm" x="56" y="144" font-size="10.5">surfaces + /api/* proxy + store.ts</text>

  <rect class="cont" x="340" y="86" width="300" height="74" rx="9"/>
  <text class="w" x="356" y="110" font-weight="600">API edge — kg_api</text>
  <text class="wm" x="356" y="127" font-size="10.5">[FastAPI · Fly]</text>
  <text class="wm" x="356" y="144" font-size="10.5">auth chokepoint · enqueue · reads · SSE</text>

  <rect class="data" x="940" y="80" width="260" height="250" rx="10"/>
  <text class="w" x="956" y="104" font-weight="700">System of record</text>
  <text class="dm" x="956" y="122" font-size="10.5">[Managed Postgres 16 + pgvector]</text>
  <text class="dm" x="956" y="146" font-size="10.5">notes · api_connections</text>
  <text class="dm" x="956" y="164" font-size="10.5">facet_cache · topical_cache</text>
  <text class="dm" x="956" y="182" font-size="10.5">note_facets (HNSW, by type)</text>
  <text class="dm" x="956" y="200" font-size="10.5">pair_dedup · feedback_events</text>
  <text class="dm" x="956" y="218" font-size="10.5">note_clusters · jobs (outbox)</text>
  <text class="dm" x="956" y="236" font-size="10.5">pipeline_runs · stage_events</text>
  <text class="dm" x="956" y="254" font-size="10.5">prompt_versions · eval_runs</text>
  <text class="dm" x="956" y="280" font-size="10.5">RLS · per-request pool ·</text>
  <text class="dm" x="956" y="296" font-size="10.5">user_id-scoped · keyed by</text>
  <text class="dm" x="956" y="312" font-size="10.5">(content_hash, model_version)</text>

  <line x1="40" y1="178" x2="900" y2="178" stroke="#C9B79A" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="44" y="194" font-size="10.5" fill="#b08a4a">HTTP boundary — engine never runs above this line</text>
  <text x="36" y="216" font-size="11" fill="#a07a3a" font-weight="600">ASYNCHRONOUS · off-path worker</text>

  <!-- queue -->
  <rect class="cont" x="340" y="224" width="300" height="64" rx="9"/>
  <text class="w" x="356" y="248" font-weight="600">KG_QUEUE — async substrate</text>
  <text class="wm" x="356" y="266" font-size="10.5">[jobs outbox in Postgres · Redis+Dramatiq drain]</text>
  <text class="wm" x="356" y="280" font-size="10.5">idempotent · at-least-once</text>

  <!-- workers + engine -->
  <rect class="eng" x="40" y="320" width="860" height="150" rx="10"/>
  <text class="w" x="58" y="344" font-weight="700">kg_workers → kg_engine pipeline (the moat)</text>
  <text class="em" x="58" y="362" font-size="10.5">[Python · Fly] · per-user engine · q = min(validity, nonobviousness) ≥ 3 · verifier decorrelated from reasoner</text>
  <g fill="#FFFFFF" stroke="#8a560f" stroke-width="1">
    <rect x="58" y="378" width="118" height="46" rx="6"/><rect x="184" y="378" width="118" height="46" rx="6"/><rect x="310" y="378" width="126" height="46" rx="6"/>
    <rect x="444" y="378" width="118" height="46" rx="6"/><rect x="570" y="378" width="126" height="46" rx="6"/><rect x="704" y="378" width="120" height="46" rx="6"/>
  </g>
  <g fill="#633806" font-size="11.5" text-anchor="middle">
    <text x="117" y="398">extract</text><text x="243" y="398">embed</text><text x="373" y="398">retrieve</text><text x="503" y="398">reason</text><text x="633" y="398">verify</text><text x="764" y="398">q ≥ 3 gate</text>
  </g>
  <g fill="#9b7b45" font-size="10" text-anchor="middle">
    <text x="117" y="414">facets</text><text x="243" y="414">abs+topical</text><text x="373" y="414">ANN·prune</text><text x="503" y="414">structure</text><text x="633" y="414">scores</text><text x="764" y="414">surface</text>
  </g>
  <text class="em" x="58" y="452" font-size="10.5">topical vector used inversely — low sim → connection (graph); high sim → cluster (Organize)</text>

  <!-- providers -->
  <rect class="ext" x="940" y="360" width="260" height="110" rx="9"/>
  <text class="w" x="956" y="384" font-weight="600">model_router → providers</text>
  <text class="xm" x="956" y="404" font-size="10.5">fake / Ollama (Community)</text>
  <text class="xm" x="956" y="422" font-size="10.5">Anthropic + Voyage (Premium)</text>
  <text class="xm" x="956" y="442" font-size="10.5">rate governor · KG_PROVIDER seam</text>

  <!-- numbered flow -->
  <line class="rel" x1="290" y1="120" x2="338" y2="120" marker-end="url(#a)"/><text class="step" x="300" y="112">1</text>
  <line class="rel" x1="490" y1="160" x2="490" y2="224" marker-end="url(#a)"/><text class="step" x="496" y="200">2</text><text class="rl" x="502" y="214">enqueue → job_id</text>
  <line class="rel" x1="420" y1="288" x2="420" y2="320" marker-end="url(#a)"/><text class="step" x="426" y="312">3</text><text class="rl" x="432" y="312">claim</text>
  <line class="rel" x1="824" y1="400" x2="938" y2="408" marker-end="url(#a)"/><text class="step" x="868" y="392">4</text><text class="rl" x="828" y="430">extract/reason/verify · embed</text>
  <line class="rel" x1="900" y1="360" x2="938" y2="300" marker-end="url(#a)"/><text class="step" x="906" y="344">5</text><text class="rl" x="828" y="338">caches + persist connections</text>
  <line class="rel" x1="640" y1="130" x2="938" y2="150" marker-end="url(#a)"/><text class="step" x="690" y="128">6</text><text class="rl" x="700" y="146">SSE status → done · reads (no engine)</text>
  <line class="rel" x1="640" y1="250" x2="900" y2="250" stroke-dasharray="4 3" marker-end="url(#a)"/><text class="rl" x="660" y="244">outbox row (same txn)</text>

  <!-- legend -->
  <rect x="40" y="690" width="15" height="15" rx="3" class="cont"/><text x="61" y="702" font-size="11" fill="#5b6068">container</text>
  <rect x="150" y="690" width="15" height="15" rx="3" class="eng"/><text x="171" y="702" font-size="11" fill="#5b6068">engine pipeline (moat)</text>
  <rect x="330" y="690" width="15" height="15" rx="3" class="data"/><text x="351" y="702" font-size="11" fill="#5b6068">data store</text>
  <rect x="445" y="690" width="15" height="15" rx="3" class="ext"/><text x="466" y="702" font-size="11" fill="#5b6068">external</text>
  <text class="step" x="560" y="703">1–6</text><text x="585" y="702" font-size="11" fill="#5b6068">on-demand trigger flow</text>

  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#9aa0a8"/></marker></defs>
</svg>

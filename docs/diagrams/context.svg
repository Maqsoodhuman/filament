<svg viewBox="0 0 1200 770" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <style>
    .bg{fill:#FFFFFF}
    .person{fill:#2A4B8D;stroke:#1B335F;stroke-width:1.2}
    .sys{fill:#1F5FA5;stroke:#143F70;stroke-width:1.4}
    .ext{fill:#7A7A75;stroke:#555550;stroke-width:1.2}
    .w{fill:#FFFFFF} .wm{fill:#E8EEF6} .em{fill:#EDEDEA}
    .rel{stroke:#9aa0a8;stroke-width:1.3;fill:none}
    .rl{fill:#5b6068;font-size:10.5px}
    .ttl{fill:#1a1a18;font-weight:700}
    text{font-size:12px}
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="770"/>
  <text class="ttl" x="32" y="30" font-size="17">System Context — Knowledge Graph (cross-source synthesis instrument)</text>
  <text x="32" y="50" font-size="12" fill="#6b675e">C4 Level 1 · who uses the system and what it depends on</text>

  <!-- personas (left) -->
  <g>
    <rect class="person" x="40" y="120" width="180" height="86" rx="9"/>
    <circle cx="60" cy="140" r="9" fill="#9db4dd"/>
    <text class="w" x="40" y="166" font-size="13" font-weight="600"><tspan x="56">Researcher / analyst</tspan></text>
    <text class="wm" x="56" y="184" font-size="10.5">writes &amp; imports notes;</text>
    <text class="wm" x="56" y="198" font-size="10.5">triggers Find connections</text>
  </g>
  <g>
    <rect class="person" x="40" y="300" width="180" height="86" rx="9"/>
    <circle cx="60" cy="320" r="9" fill="#9db4dd"/>
    <text class="w" x="56" y="346" font-size="13" font-weight="600">Premium subscriber</text>
    <text class="wm" x="56" y="364" font-size="10.5">hosted; background scan</text>
    <text class="wm" x="56" y="378" font-size="10.5">+ weekly digest</text>
  </g>
  <g>
    <rect class="person" x="40" y="470" width="180" height="86" rx="9"/>
    <circle cx="60" cy="490" r="9" fill="#9db4dd"/>
    <text class="w" x="56" y="516" font-size="13" font-weight="600">Self-host operator</text>
    <text class="wm" x="56" y="534" font-size="10.5">Community: runs locally,</text>
    <text class="wm" x="56" y="548" font-size="10.5">BYO Ollama, private</text>
  </g>

  <!-- system in scope (center) -->
  <rect x="380" y="250" width="320" height="200" rx="12" fill="none" stroke="#A9C4E6" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="392" y="244" font-size="11" fill="#7e93b3">system in scope</text>
  <rect class="sys" x="400" y="280" width="280" height="140" rx="10"/>
  <text class="w" x="540" y="320" text-anchor="middle" font-size="16" font-weight="700">Knowledge Graph</text>
  <text class="wm" x="540" y="344" text-anchor="middle" font-size="11">surfaces non-obvious, true,</text>
  <text class="wm" x="540" y="360" text-anchor="middle" font-size="11">cross-domain connections</text>
  <text class="wm" x="540" y="376" text-anchor="middle" font-size="11">between a user's notes —</text>
  <text class="wm" x="540" y="392" text-anchor="middle" font-size="11">the engine is the moat (q≥3 gate)</text>

  <!-- external systems (right + top + bottom) -->
  <g><rect class="ext" x="800" y="70" width="190" height="64" rx="9"/><text class="w" x="816" y="98" font-weight="600">Anthropic API</text><text class="em" x="816" y="116" font-size="10.5">Haiku extract · Sonnet</text><text class="em" x="816" y="129" font-size="10.5">reason + verify (Premium)</text></g>
  <g><rect class="ext" x="1000" y="70" width="170" height="64" rx="9"/><text class="w" x="1016" y="98" font-weight="600">Voyage</text><text class="em" x="1016" y="116" font-size="10.5">abstraction + topical</text><text class="em" x="1016" y="129" font-size="10.5">embeddings (Premium)</text></g>
  <g><rect class="ext" x="1000" y="160" width="170" height="60" rx="9"/><text class="w" x="1016" y="186" font-weight="600">Ollama</text><text class="em" x="1016" y="204" font-size="10.5">local models (Community)</text></g>
  <g><rect class="ext" x="800" y="250" width="190" height="60" rx="9"/><text class="w" x="816" y="276" font-weight="600">Clerk</text><text class="em" x="816" y="294" font-size="10.5">auth / JWT (Premium)</text></g>
  <g><rect class="ext" x="800" y="330" width="190" height="60" rx="9"/><text class="w" x="816" y="356" font-weight="600">Object store (S3 / R2)</text><text class="em" x="816" y="374" font-size="10.5">raw import blobs</text></g>
  <g><rect class="ext" x="800" y="410" width="190" height="64" rx="9"/><text class="w" x="816" y="436" font-weight="600">Import connectors</text><text class="em" x="816" y="454" font-size="10.5">Readwise · Notion · Kindle</text><text class="em" x="816" y="467" font-size="10.5">· file-drop</text></g>
  <g><rect class="ext" x="1000" y="410" width="170" height="64" rx="9"/><text class="w" x="1016" y="436" font-weight="600">Email / digest</text><text class="em" x="1016" y="454" font-size="10.5">weekly connections</text><text class="em" x="1016" y="467" font-size="10.5">email (Premium)</text></g>
  <g><rect class="ext" x="800" y="500" width="190" height="56" rx="9"/><text class="w" x="816" y="524" font-weight="600">Sentry</text><text class="em" x="816" y="542" font-size="10.5">errors (scrubbed)</text></g>

  <!-- relationships -->
  <line class="rel" x1="220" y1="160" x2="398" y2="300" marker-end="url(#a)"/><text class="rl" x="240" y="218">writes / imports notes ·</text><text class="rl" x="240" y="232">triggers Find connections</text>
  <line class="rel" x1="398" y1="380" x2="220" y2="335" marker-end="url(#a)"/><text class="rl" x="250" y="372">surfaced connections,</text><text class="rl" x="250" y="386">graph, clusters, feedback</text>
  <line class="rel" x1="220" y1="510" x2="400" y2="410" marker-end="url(#a)"/>
  <line class="rel" x1="680" y1="300" x2="800" y2="100" marker-end="url(#a)"/><text class="rl" x="690" y="210">extract / reason / verify</text>
  <line class="rel" x1="685" y1="320" x2="1000" y2="180" marker-end="url(#a)"/><text class="rl" x="720" y="260">embed</text>
  <line class="rel" x1="680" y1="345" x2="800" y2="280" marker-end="url(#a)"/>
  <line class="rel" x1="680" y1="365" x2="800" y2="360" marker-end="url(#a)"/><text class="rl" x="700" y="350">store blobs</text>
  <line class="rel" x1="680" y1="390" x2="800" y2="440" marker-end="url(#a)"/><text class="rl" x="690" y="424">pull library</text>
  <line class="rel" x1="685" y1="410" x2="1000" y2="440" marker-end="url(#a)"/><text class="rl" x="760" y="404">digest</text>

  <!-- legend -->
  <rect x="40" y="690" width="16" height="16" rx="3" class="person"/><text x="62" y="703" font-size="11" fill="#5b6068">person (user)</text>
  <rect x="190" y="690" width="16" height="16" rx="3" class="sys"/><text x="212" y="703" font-size="11" fill="#5b6068">system in scope</text>
  <rect x="350" y="690" width="16" height="16" rx="3" class="ext"/><text x="372" y="703" font-size="11" fill="#5b6068">external system</text>
  <line x1="500" y1="698" x2="540" y2="698" class="rel"/><text x="548" y="702" font-size="11" fill="#5b6068">relationship</text>
  <text x="760" y="702" font-size="11" fill="#9aa0a8">Community vs Premium dependencies noted per box</text>

  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#9aa0a8"/></marker></defs>
</svg>
